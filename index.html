<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Track SP Links</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page">
    <header class="topbar">
      <div>
        <h1>Track SP</h1>
        <p>Dan link, luu lai, roi bam de mo nhanh.</p>
      </div>
    </header>

    <main class="main">
      <section class="panel">
        <form id="linkForm" class="link-form" action="#">
          <label for="linkInput">Link can luu</label>
          <div class="input-row">
            <input id="linkInput" type="text" autocomplete="off" placeholder="https://example.com">
            <button type="submit">Them link</button>
          </div>
          <p id="message" class="message" aria-live="polite"></p>
        </form>
      </section>

      <section class="panel">
        <div class="list-head">
          <h2>Danh sach link</h2>
          <button id="clearBtn" class="secondary" type="button">Xoa het</button>
        </div>
        <ul id="linksList" class="links-list"></ul>
        <p id="emptyState" class="empty">Chua co link nao.</p>
      </section>
    </main>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
